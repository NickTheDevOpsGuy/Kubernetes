apiVersion: v1
kind: Pod
metadata:
  name: mc1
  labels:
    app: sidecar-demo
spec:
  volumes:
    - name: html
      emptyDir: {}
  initContainers:
    - name: init-page
      image: alpine:3.20
      command: ["sh","-c"]
      args:
        - 'echo "<h1>Hello from sidecar demo</h1>" > /html/index.html'
      volumeMounts:
        - name: html
          mountPath: /html

  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html

    - name: ticker
      image: alpine:3.20
      command: ["sh","-c"]
      args:
        - |
          while true; do
            echo "$(date)" >> /html/index.html;
            sleep 1;
          done
      volumeMounts:
        - name: html
          mountPath: /html