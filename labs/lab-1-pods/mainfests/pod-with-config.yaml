apiVersion: v1
kind: Pod
metadata:
  name: nginx-config-pod
  labels:
    app: nginx-config
spec:
  containers:
  - name: nginx-container
    image: nginx:1.27-alpine
    ports:
      - containerPort: 80
    env:
      - name: WELCOME_MSG
        value: "Hello from a Pod with Config!"
    volumeMounts:
      - name: config-volume
        mountPath: /usr/share/nginx/html
        readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  index.html: |
    <html>
    <head><title>Kubernetes Config Demo</title></head>
    <body>
      <h1>${WELCOME_MSG}</h1>
      <p>This index.html came from a ConfigMap!</p>
    </body>
    </html>