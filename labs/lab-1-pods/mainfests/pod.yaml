apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:
      - containerPort: 80
    resources:                     # (Optional) Resource requests & limits
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    livenessProbe:                 # (Optional) Check if container is healthy
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 5
    readinessProbe:                # (Optional) Check if container is ready
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5